spring.application.name=mtgcollectionmanager

server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mtg_collection_manager}
spring.datasource.username=${DB_USERNAME:mtg_user}
spring.datasource.password=${DB_PASSWORD:mtg_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.user.name=admin
spring.security.user.password=admin